name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Run ESLint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Run Playwright tests
        run: npm run test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run ruff check
        run: uv run ruff check src/

      - name: Run ruff format check
        run: uv run ruff format --check src/

      - name: Run mypy
        run: uv run mypy src/ --ignore-missing-imports

      - name: Check mypy ignore_errors not increased
        run: uv run python scripts/check_mypy_ignore_errors.py

      - name: Run render parity tests
        run: >
          uv run pytest
          tests/test_audio_mixer.py
          tests/test_render_package_builder.py
          tests/test_render_pipeline.py
          tests/test_timeline_normalization.py
          -q
        env:
          ENVIRONMENT: test
          DEV_MODE: "true"

      # Run the broad backend suite excluding tests that require
      # local services, live API credentials, database fixtures, or local test data.
      - name: Run pytest (broad backend CI suite — no DB)
        run: >
          uv run pytest
          tests/
          -v
          --tb=short
          -m
          "not requires_db and not requires_test_data and not requires_e2e and not requires_live_api"
        env:
          ENVIRONMENT: test
          DEV_MODE: "true"

  backend-db-checks:
    name: Backend DB Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: douga
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run pytest (requires_db suite)
        run: >
          uv run pytest
          tests/
          -v
          --tb=short
          -m
          "requires_db and not requires_test_data and not requires_e2e and not requires_live_api"
        env:
          ENVIRONMENT: test
          DEV_MODE: "true"
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/douga"
